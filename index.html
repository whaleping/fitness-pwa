<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的健身助手</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 1.4rem; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 0.9rem; margin-bottom: 20px; }
        .plan-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; background: #ecf0f1; font-weight: bold; }
        button.active { background: #3498db; color: white; }
        .instruction-box { background: #fff3cd; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; color: #856404; line-height: 1.5; border-left: 5px solid #ffc107; }
        .exercise-item { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; font-weight: bold; color: #34495e; margin-bottom: 5px; }
        .reps-tag { font-size: 0.75rem; color: #e67e22; font-weight: bold; margin-left: 5px; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; background-color: #fff; }
        .pair-group { display: flex; gap: 10px; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #3498db; }
        .cardio-footer { margin-top: 25px; padding: 15px; background: #27ae60; color: white; text-align: center; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏋️ 健身計畫助手</h1>
    <p class="subtitle">訓練流程：1 ➔ 2a+2b ➔ 3a+3b</p>
    
    <div class="plan-selector">
        <button onclick="renderPlan('A')" id="btnA">計畫 A</button>
        <button onclick="renderPlan('B')" id="btnB">計畫 B</button>
    </div>

    <div class="instruction-box">
        🎯 <b>訓練重點：</b><br>
        1. 每個區間皆完成 <b>3 組</b>。<br>
        2. 核心動作維持 <b>30-60 秒</b>，其餘動作 <b>10-12 下</b>。<br>
        3. <b>每個動作間休息 1 分鐘</b>。
    </div>

    <div id="planDisplay"></div>

    <div class="cardio-footer">
        🏃‍♂️ 重訓結束後，請進行有氧運動！
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
    }

    const exercises = {
        "核心": ["前平板式", "側平板式", "爬山式"],
        "腿後肌與臀肌": ["單腳啞鈴直膝硬舉", "單腳抬臀", "啞鈴登階"],
        "上背肌": ["啞鈴划船", "彈力繩划船"],
        "股四頭": ["啞鈴深蹲", "高腳杯深蹲"],
        "胸肌": ["伏地挺身", "啞鈴推舉"],
        "背闊肌": ["引體向上", "滑輪下拉", "直臂下拉"],
        "肩膀": ["肩推", "側平舉", "30度肩膀平舉和聳肩"]
    };

    const plans = {
        "A": [
            { label: "1. 核心", type: "核心" },
            { isPair: true, a: { label: "2a. 腿後肌與臀肌", type: "腿後肌與臀肌" }, b: { label: "2b. 上背肌", type: "上背肌" } },
            { isPair: true, a: { label: "3a. 股四頭", type: "股四頭" }, b: { label: "3b. 胸肌", type: "胸肌" } }
        ],
        "B": [
            { label: "1. 核心", type: "核心" },
            { isPair: true, a: { label: "2a. 股四頭", type: "股四頭" }, b: { label: "2b. 背闊肌", type: "背闊肌" } },
            { isPair: true, a: { label: "3a. 腿後肌與臀肌", type: "腿後肌與臀肌" }, b: { label: "3b. 肩膀", type: "肩膀" } }
        ]
    };

    function renderPlan(planId) {
        const display = document.getElementById('planDisplay');
        display.innerHTML = '';
        document.getElementById('btnA').className = (planId === 'A' ? 'active' : '');
        document.getElementById('btnB').className = (planId === 'B' ? 'active' : '');

        plans[planId].forEach(item => {
            if (item.isPair) {
                const group = document.createElement('div');
                group.className = 'pair-group';
                
                // 判斷 a 與 b 的單位
                const unitA = item.a.type === "核心" ? "30-60秒" : "10-12下";
                const unitB = item.b.type === "核心" ? "30-60秒" : "10-12下";

                group.innerHTML = `
                    <div style="flex:1" class="exercise-item">
                        <label>${item.a.label}<span class="reps-tag">(${unitA})</span></label>
                        <select>${generateOptions(item.a.type)}</select>
                    </div>
                    <div style="flex:1" class="exercise-item">
                        <label>${item.b.label}<span class="reps-tag">(${unitB})</span></label>
                        <select>${generateOptions(item.b.type)}</select>
                    </div>
                `;
                display.appendChild(group);
            } else {
                const div = document.createElement('div');
                div.className = 'exercise-item';
                const unit = item.type === "核心" ? "30-60秒" : "10-12下";
                
                div.innerHTML = `
                    <label>${item.label}<span class="reps-tag">(${unit})</span></label>
                    <select>${generateOptions(item.type)}</select>
                `;
                display.appendChild(div);
            }
        });
    }

    function generateOptions(type) {
        return exercises[type].map(ex => `<option value="${ex}">${ex}</option>`).join('');
    }

    renderPlan('A');
</script>
</body>
</html>
