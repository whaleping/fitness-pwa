<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的健身助手</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5rem; }
        .plan-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; background: #ecf0f1; color: #7f8c8d; font-weight: bold; transition: 0.3s; }
        button.active { background: #3498db; color: white; }
        .exercise-item { margin-bottom: 20px; }
        .exercise-item label { display: block; font-size: 0.9rem; font-weight: 700; color: #34495e; margin-bottom: 8px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 1rem; appearance: none; }
        .pair-group { display: flex; gap: 10px; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .pair-group .exercise-item { flex: 1; margin-bottom: 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏋️ 健身計畫助手</h1>
    
    <div class="plan-selector">
        <button onclick="renderPlan('A')" id="btnA">計畫 A</button>
        <button onclick="renderPlan('B')" id="btnB">計畫 B</button>
    </div>

    <div id="planDisplay"></div>
</div>

<script>
    // 註冊 Service Worker (PWA 的關鍵)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker 註冊成功'))
                .catch(err => console.log('註冊失敗', err));
        });
    }

    // 健身資料與邏輯
    const exercises = {
        "核心": ["棒式", "死蟲式", "側撐體"],
        "腿後肌跟臀肌": ["羅馬尼亞硬舉", "橋式", "機械腿後勾"],
        "上背肌": ["滑輪下拉", "槓鈴划船", "坐姿划船"],
        "股四頭": ["深蹲", "腿部伸展機", "分腿蹲"],
        "胸肌": ["臥推", "啞鈴飛鳥", "俯臥撐"],
        "背闊": ["引體向上", "寬握下拉", "直臂下壓"],
        "肩膀": ["肩推", "側平舉", "臉拉"]
    };

    const plans = {
        "A": [
            { label: "1. 核心", type: "核心" },
            { isPair: true, a: { label: "2a. 腿後肌跟臀肌", type: "腿後肌跟臀肌" }, b: { label: "2b. 上背肌", type: "上背肌" } },
            { isPair: true, a: { label: "3a. 股四頭", type: "股四頭" }, b: { label: "3b. 胸肌", type: "胸肌" } }
        ],
        "B": [
            { label: "1. 核心", type: "核心" },
            { isPair: true, a: { label: "2a. 股四頭", type: "股四頭" }, b: { label: "2b. 背闊", type: "背闊" } },
            { isPair: true, a: { label: "3a. 腿後肌跟臀肌", type: "腿後肌跟臀肌" }, b: { label: "3b. 肩膀", type: "肩膀" } }
        ]
    };

    function renderPlan(planId) {
        const display = document.getElementById('planDisplay');
        display.innerHTML = '';
        document.getElementById('btnA').className = (planId === 'A' ? 'active' : '');
        document.getElementById('btnB').className = (planId === 'B' ? 'active' : '');

        plans[planId].forEach(item => {
            if (item.isPair) {
                const group = document.createElement('div');
                group.className = 'pair-group';
                group.innerHTML = `
                    <div class="exercise-item"><label>${item.a.label}</label><select>${generateOptions(item.a.type)}</select></div>
                    <div class="exercise-item"><label>${item.b.label}</label><select>${generateOptions(item.b.type)}</select></div>
                `;
                display.appendChild(group);
            } else {
                const div = document.createElement('div');
                div.className = 'exercise-item';
                div.innerHTML = `<label>${item.label}</label><select>${generateOptions(item.type)}</select>`;
                display.appendChild(div);
            }
        });
    }

    function generateOptions(type) {
        return exercises[type].map(ex => `<option value="${ex}">${ex}</option>`).join('');
    }

    renderPlan('A');
</script>
</body>
</html>
